# Timezone
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Colombo

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=pos
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.schemas=pos
spring.flyway.default-schema=pos

# Server
server.port=8082

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ImageKit
imagekit.public-key=${IMAGEKIT_PUBLIC_KEY}
imagekit.private-key=${IMAGEKIT_PRIVATE_KEY}
imagekit.url-endpoint=${IMAGEKIT_URL_ENDPOINT}

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Manager PIN
pos.manager.pin=${MANAGER_PIN}

# Ecommerce Sync
ecommerce.sync.api-key=${ECOMMERCE_SYNC_API_KEY}
ecommerce.sync.url=${ECOMMERCE_SYNC_URL}

# CORS
cors.allowed-origins=${ALLOWED_ORIGINS}

# Logging
logging.level.root=INFO
logging.level.com.ghanim=DEBUG
