# Server
server.port=8081
spring.application.name=ghanim-pos

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ghanim_pos}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=pos
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.schemas=pos,public
spring.flyway.default-schema=pos
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.out-of-order=true

# JWT
    jwt.secret=${JWT_SECRET:GhanimPOS-dev-secret-key-change-in-production-must-be-long-enough-for-HS512}
jwt.expiration=86400000

# CORS
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}

# ImageKit
imagekit.public-key=${IMAGEKIT_PUBLIC_KEY:public_Mlgytod1d5mof/n/Vxabx1/fE64=}
imagekit.private-key=${IMAGEKIT_PRIVATE_KEY:private_VroeeHSnjDC024o9wYZfTVm3o8Y=}
imagekit.url-endpoint=${IMAGEKIT_URL_ENDPOINT:https://ik.imagekit.io/ghanimaccount}

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Manager PIN (change this to your own 4-digit PIN)
pos.manager.pin=${MANAGER_PIN:1234}

# Logging
logging.level.com.ghanim.pos=INFO
logging.level.org.flywaydb=INFO
